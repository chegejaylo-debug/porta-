<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card p-4" style="width:300px;">
        <h4 class="text-center">Student Login</h4>

        <input type="text" id="username" class="form-control mb-2" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button onclick="login()" class="btn btn-primary btn-block">Login</button>
    </div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // Simple test login
    if (user === "admin" && pass === "1234") {
        alert("Login successful");
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid credentials:PLEASE TRY AGAIN OR HELP@ADMIN");
    }
}
</script>

</body>
<div class="row">
  <div class="col-md-4">
    <div class="card text-center p-3">
      <h5>Total Students</h5>
      <p>120</p>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-3">
      <h5>Pending Results</h5>
      <p>15</p>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-3">
      <h5>Announcements</h5>
      <p>3</p>
    </div>
  </div>
</div>

    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Grade</th>
      <th>Status</th>
    </tr>
  </thead>

      <td>001</td>

      <td>Passed</td>
    </tr>
  </tbody>
</table>
<div class="alert alert-info mt-3">
  New exam schedule released for Term 2.
</div>
</html>
